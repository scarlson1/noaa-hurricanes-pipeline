name: Deploy Infrastructure

on:
  push:
    branches: [main]
    paths:
      - 'docker-compose-oracle.yaml'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Write service account JSON
        run: echo '${{ secrets.GCP_SERVICE_ACCOUNT_JSON }}' > service-account.json

      - name: Generate .env (plain - for Docker Compose interpolation)
        run: |
          cat <<EOF > .env
          COCKROACH_PASSWORD=${{ secrets.COCKROACH_PASSWORD }}
          KESTRA_USER=${{ secrets.KESTRA_USER }}
          KESTRA_PASSWORD=${{ secrets.KESTRA_PASSWORD }}
          GEMINI_KEY=${{ secrets.GEMINI_KEY }}
          EOF

      - name: Generate .env_encoded (base64 - for Kestra secret store)
        run: |
          encode() { echo -n "$1" | base64 -w 0; }
          cat <<EOF > .env_encoded
          SECRET_GCP_SERVICE_ACCOUNT=$(encode '${{ secrets.GCP_SERVICE_ACCOUNT_JSON }}')
          SECRET_COCKROACH_PASSWORD=$(encode '${{ secrets.COCKROACH_PASSWORD }}')
          SECRET_SLACK_WEBHOOK_URL=$(encode '${{ secrets.SLACK_WEBHOOK_URL }}')
          EOF

      - name: Write SSH key
        run: |
          mkdir -p ~/.ssh
          echo '${{ secrets.OCI_SSH_PRIVATE_KEY }}' > ~/.ssh/oracle-kestra
          chmod 600 ~/.ssh/oracle-kestra

      - name: Write CockroachDB cert
        run: echo '${{ secrets.COCKROACH_CA_CERT }}' | base64 -d > root.crt

      # alternatively, load from GCP secret manager
      # - name: Fetch CockroachDB cert from GCP Secret Manager
      #   run: |
      #     ssh $SSH_OPTS $VM "
      #       echo '${{ secrets.GCP_SERVICE_ACCOUNT_JSON }}' > /tmp/sa.json
      #       gcloud auth activate-service-account --key-file=/tmp/sa.json
      #       gcloud secrets versions access latest --secret=COCKROACH_CA > ~/kestra/certs/root.crt
      #       chmod 600 ~/kestra/certs/root.crt
      #       rm /tmp/sa.json
      #     "

      - name: Copy files to VM
        run: |
          SSH_OPTS="-o StrictHostKeyChecking=no -i ~/.ssh/oracle-kestra"
          SCP_OPTS="-o StrictHostKeyChecking=no -i ~/.ssh/oracle-kestra"
          VM="opc@${{ secrets.OCI_VM_IP }}"

          ssh $SSH_OPTS $VM "mkdir -p ~/kestra/certs"

          scp $SCP_OPTS docker-compose-oracle.yaml $VM:~/kestra/compose.yaml
          scp $SCP_OPTS service-account.json       $VM:~/kestra/service-account.json
          scp $SCP_OPTS root.crt                   $VM:~/kestra/certs/root.crt
          scp $SCP_OPTS .env                       $VM:~/kestra/.env
          scp $SCP_OPTS .env_encoded               $VM:~/kestra/.env_encoded

      - name: Restart Kestra
        run: |
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/oracle-kestra opc@${{ secrets.OCI_VM_IP }} \
            "cd ~/kestra && sudo systemctl restart kestra"
